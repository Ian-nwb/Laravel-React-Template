services:
  mysql:
    image: 'mysql:8.0'
    ports:
      - '${DB_PORT}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_DATABASE: '${DB_DATABASE}'
    volumes:
      - 'sail-mysql:/var/lib/mysql'
    networks:
      - sail

  phpmyadmin:
    image: 'phpmyadmin/phpmyadmin'
    ports:
      - '8081:80'
    environment:
      PMA_HOST: mysql
    networks:
      - sail

networks:
  sail:
    driver: bridge

volumes:
  sail-mysql:
    driver: local